name: peptide_os
description: "Intelligent peptide protocol manager — track doses, calculate reconstitution, manage protocols."
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  in_app_review: ^2.0.10

  # ── Firebase ─────────────────────────────────────────────────────────
  firebase_core: ^3.8.0
  cloud_firestore: ^5.6.0
  firebase_auth: ^5.3.3
  firebase_crashlytics: ^4.3.2
  firebase_analytics: ^11.4.2
  firebase_messaging: ^15.1.6

  # ── Auth providers ───────────────────────────────────────────────────
  sign_in_with_apple: ^6.1.4
  google_sign_in: ^6.2.1
  crypto: ^3.0.6

  # ── Monetisation ─────────────────────────────────────────────────────
  purchases_flutter: ^8.4.0

  # ── Attribution ──────────────────────────────────────────────────────
  apprefer:
    git:
      url: https://github.com/AppAgentic/apprefer-flutter-sdk.git
      ref: 0.4.1
  facebook_app_events: ^0.24.0
  app_tracking_transparency: ^2.0.4

  # ── Utilities ────────────────────────────────────────────────────────
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  package_info_plus: ^8.0.0

  # ── State management ─────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Charts ───────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Notifications ────────────────────────────────────────────────────
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  # path_provider_foundation 2.6.0 pulls in the objective_c native asset, which
  # Flutter 3.41.4 packaged with a simulator platform slice in iOS release IPAs.
  path_provider_foundation: 2.5.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/animations/
